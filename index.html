<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>智慧衣櫥 v5.20 — OOTD 自動統計版</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color:transparent;}
:root{
  --bg: #F5F7FA; --sur: #FFFFFF; --sur2: #F0F2F5; --txt: #1C1C1E; --mut: #8E8E93;
  --accent: #2C2C2E; --blue: #007AFF; --red: #FF3B30; --shadow: 0 8px 24px rgba(0,0,0,0.04);
  --nav-bg: rgba(255,255,255,0.85); --r: 16px; --rl: 24px;
}

body.dark-mode {
  --bg: #000000; --sur: #1C1C1E; --sur2: #2C2C2E; --txt: #F2F2F7; --mut: #98989D;
  --accent: #E5E5EA; --nav-bg: rgba(28,28,30,0.85); --shadow: 0 8px 24px rgba(0,0,0,0.4);
}
body.dark-mode .btn-p { color: #1C1C1E; font-weight:800; }
body.dark-mode .btn-sec { background: #2C2C2E; color: #F2F2F7; }

body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--txt); min-height:100vh; font-size:15px; line-height:1.5; padding-bottom:90px; transition: 0.3s;}
.app{max-width:740px; margin:0 auto; padding:2rem 1.2rem; display:none;} 

.hd{display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem}
.hd-t{font-size:22px; font-weight:800; letter-spacing:-0.5px}
.storage-txt{font-size:12px; color:var(--blue); font-weight:700;}

.theme-btn { background: var(--sur); border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; box-shadow: var(--shadow); }

.panel{display:none; animation:fadeIn 0.3s ease;}
.panel.active{display:block}
@keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

.zone{background:var(--sur); border-radius:var(--rl); padding:2.5rem 1rem; text-align:center; cursor:pointer; box-shadow:var(--shadow);}
.ef{background:var(--sur); border-radius:var(--rl); padding:20px; margin-top:16px; box-shadow:var(--shadow);}
.g2{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px}
.fld{display:flex; flex-direction:column; gap:6px}
.lbl{font-size:11px; font-weight:700; color:var(--mut);}
input,select{font-family:inherit; font-size:14px; padding:12px 14px; border:none; border-radius:12px; background:var(--sur2); width:100%; font-weight:500; color:var(--txt);}

.tool-bar{display:flex; gap:8px; margin-bottom:16px;}
.search-box{flex:1; display:flex; align-items:center; background:var(--sur); border-radius:99px; padding:4px 16px; box-shadow:var(--shadow);}
.search-box input{border:none; background:transparent; padding:10px 5px; width:100%;}
.sort-sel{background:var(--sur); border-radius:99px; padding:0 12px; border:none; box-shadow:var(--shadow); font-size:13px; font-weight:600; color:var(--txt);}

.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:16px}
.card{background:var(--sur); border-radius:var(--rl); overflow:hidden; box-shadow:var(--shadow); padding-bottom:12px; display:flex; flex-direction:column; position:relative;}
.cimg{width:100%; height:160px; object-fit:cover; cursor:zoom-in;}
.cbody{padding:12px 12px 0; flex-grow:1; display:flex; flex-direction:column;}
.c-name{font-weight:700; font-size:14px; margin-bottom:4px; text-overflow:ellipsis; overflow:hidden; white-space:nowrap;}
.tag{font-size:10px; padding:4px 8px; border-radius:6px; background:var(--sur2); color:var(--mut); font-weight:700; display:inline-block; margin-bottom:4px; margin-right:4px;}
.wear-badge{font-size:12px; font-weight:700; color:var(--blue); margin-top:auto; padding-top:8px; border-top:1px solid var(--sur2); display:flex; align-items:center; gap:4px;}

.btn-edit-float{position:absolute; top:8px; right:8px; background:rgba(255,255,255,0.8); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; color:#333; z-index:10;}
.modal-overlay{position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(5px); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px;}
.modal-overlay.active{display:flex;}
.modal-card{background:var(--sur); width:100%; max-width:400px; border-radius:var(--rl); padding:24px; max-height:90vh; overflow-y:auto;}

.cal-grid{display:grid; grid-template-columns:repeat(7, 1fr); gap:4px; margin-top:8px;}
.cal-day{aspect-ratio:1; border-radius:8px; background:var(--sur2); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:var(--mut); position:relative; overflow:hidden;}
.cal-day.has-ootd{background-size:cover; background-position:center; color:transparent;}
.cal-day.has-ootd::after{content:''; position:absolute; inset:0; box-shadow:inset 0 0 0 2px var(--accent); border-radius:8px;}

.pack-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:8px; margin-top:12px;}
.p-chk-img{width:100%; height:80px; object-fit:cover; border-radius:12px; border:3px solid transparent; cursor:pointer;}
.p-chk-img.selected{border-color:var(--blue); transform:scale(0.95);}

.btn{cursor:pointer; padding:12px; border-radius:99px; border:none; width:100%; font-family:inherit; font-size:14px; font-weight:700; margin-top:8px; transition:0.2s;}
.btn-p{background:var(--accent); color:#fff;}
.btn-sec{background:var(--sur2); color:var(--txt);}
.btn-danger{background:none; color:var(--red); font-size:11px; padding:6px;}

.bottom-nav{position:fixed; bottom:0; left:0; right:0; background:var(--nav-bg); backdrop-filter:blur(15px); display:flex; justify-content:space-around; padding:10px 0 calc(10px + env(safe-area-inset-bottom)); box-shadow:0 -1px 0 rgba(0,0,0,0.05); z-index:100;}
.nav-item{display:flex; flex-direction:column; align-items:center; color:var(--mut); border:none; background:none; font-size:10px; font-weight:600; gap:4px; flex:1;}
.nav-item.active{color:var(--blue);} 
.icon{font-size:22px;}

.toast{position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-100px); background:var(--blue); color:#fff; padding:12px 24px; border-radius:99px; transition:0.4s; z-index:1100; font-weight:600; box-shadow:0 10px 30px rgba(0,122,255,0.3);}
.toast.show{transform:translateX(-50%) translateY(0)}

.stat-box{background:var(--sur); padding:20px; border-radius:var(--rl); box-shadow:var(--shadow);}
#loading-screen{position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column;}
</style>
</head>
<body>

<div id="loading-screen">
  <div style="font-size:40px; margin-bottom:15px;">👕</div>
  <div style="font-weight:800; font-size:18px;">正在整理衣櫥...</div>
</div>

<div class="app" id="main-app">
  
  <div class="hd">
    <span class="hd-t">Wardrobe <span style="font-size:12px; color:var(--blue);">v5.20</span></span>
    <div style="display:flex; align-items:center; gap:12px;">
      <span class="storage-txt" id="st-txt">計算中...</span>
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>
  </div>

  <div id="p-cat" class="panel active">
    <div class="zone" id="dz" onclick="document.getElementById('fi').click()">
      <input type="file" id="fi" accept="image/*" multiple style="display:none" onchange="onFile(event)">
      <div style="font-size:40px; margin-bottom:10px;">📸</div>
      <p style="font-weight:700;">點擊新增單品</p>
    </div>
    <div class="ef" id="step2" style="display:none">
      <div id="batch-status" style="font-size:12px; font-weight:700; color:var(--blue); margin-bottom:12px; text-align:center;"></div>
      <div class="g2">
        <div class="fld"><span class="lbl">名稱</span><input type="text" id="ef-name" placeholder="例：黑色短踢"></div>
        <div class="fld"><span class="lbl">類型</span><select id="ef-type"><option>上身</option><option>褲子</option><option>外套</option><option>鞋子</option><option>配件</option><option>襪子</option></select></div>
      </div>
      <div class="g2">
        <div class="fld"><span class="lbl">尺寸</span><select id="ef-size"><option value="未填">未填</option><option>XS</option><option>S</option><option>M</option><option>L</option><option>XL</option><option>F</option></select></div>
        <div class="fld"><span class="lbl">顏色</span><input type="text" id="ef-color" placeholder="例：黑"></div>
      </div>
      <div class="fld" style="margin-bottom:12px;"><span class="lbl">購入價格</span><input type="number" id="ef-price"></div>
      <button class="btn btn-p" onclick="addItem()">完成建檔</button>
      <button class="btn btn-sec" onclick="skipItem()">跳過</button>
    </div>
  </div>

  <div id="p-war" class="panel">
    <div class="tool-bar">
      <div class="search-box"><span>🔍</span><input type="text" id="search-input" placeholder="搜尋..." oninput="renderWar()"></div>
      <select class="sort-sel" id="sort-order" onchange="renderWar()">
        <option value="new">🆕 最新</option>
        <option value="wear_most">🔥 穿著次數</option>
        <option value="cpw_low">👑 穿一次最省</option>
      </select>
    </div>
    <div class="grid" id="wgrid"></div>
  </div>

  <div id="p-ootd" class="panel">
    <button class="btn btn-p" onclick="document.getElementById('ootd-file').click()" style="margin-bottom:16px;">📸 上傳今日穿搭 (OOTD)</button>
    <input type="file" id="ootd-file" accept="image/*" style="display:none" onchange="onOotdFile(event)">
    
    <div id="ootd-content"></div>
  </div>

  <div id="p-ins" class="panel">
    <div class="g2">
      <div class="stat-box"><span class="lbl">總價值</span><div style="font-size:24px; font-weight:800;" id="st-total">$0</div></div>
      <div class="stat-box"><span class="lbl">平均穿一次成本</span><div style="font-size:24px; font-weight:800;" id="st-cpw">$0</div></div>
    </div>
    <div class="stat-box" style="margin-top:16px;">
      <span class="lbl">備份功能</span>
      <button class="btn btn-sec" onclick="exportData()" style="margin-top:12px;">⬇️ 下載備份 (.json)</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="ootd-tag-modal">
  <div class="modal-card">
    <h3 style="margin-bottom:8px;">標記這套穿了什麼？</h3>
    <div id="ootd-tag-selector" class="pack-grid" style="max-height:50vh; overflow-y:auto;"></div>
    <input type="hidden" id="ootd-tag-id">
    <button class="btn btn-p" onclick="saveOotdTags()">✓ 完成標記</button>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal-card">
    <h3>編輯單品</h3>
    <div class="fld"><span class="lbl">名稱</span><input type="text" id="ed-name"></div>
    <div class="fld"><span class="lbl">價格</span><input type="number" id="ed-price"></div>
    <input type="hidden" id="ed-id">
    <button class="btn btn-p" onclick="saveEdit()">儲存</button>
    <button class="btn btn-danger" onclick="deleteItem()">刪除單品</button>
    <button class="btn btn-sec" onclick="document.getElementById('edit-modal').classList.remove('active')">取消</button>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-item active" onclick="go('cat')"><span class="icon">✨</span><span>建檔</span></button>
  <button class="nav-item" onclick="go('war')"><span class="icon">👕</span><span>衣櫥</span></button>
  <button class="nav-item" onclick="go('ootd')"><span class="icon">📸</span><span>穿搭</span></button>
  <button class="nav-item" onclick="go('ins')"><span class="icon">📊</span><span>洞察</span></button>
</nav>

<div class="toast" id="toast"></div>

<script>
let W=[], OOTD=[]; let uploadQueue = [];
const DB_NAME = 'WardrobeDB_v5'; const STORE = 'AppState'; let idb;

async function initDB() {
  return new Promise(resolve => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
    req.onsuccess = e => { idb = e.target.result; resolve(); };
  });
}
async function idbGet(k) { return new Promise(r => { const tx = idb.transaction(STORE,'readonly'); const req = tx.objectStore(STORE).get(k); req.onsuccess = e => r(e.target.result); }); }
async function idbSet(k, v) { return new Promise(r => { const tx = idb.transaction(STORE,'readwrite'); const req = tx.objectStore(STORE).put(v, k); req.onsuccess = () => r(); }); }

window.onload = async () => {
  await initDB();
  W = (await idbGet('W')) || [];
  OOTD = (await idbGet('OOTD')) || [];
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  updateSt(); go('cat');
};

// 核心邏輯：穿著次數只從 OOTD 裡面算
function getWearCount(itemId) {
  return OOTD.filter(o => o.items && o.items.includes(itemId)).length;
}

function cpw(i) {
  const count = getWearCount(i.id);
  return Math.round(i.price / (count || 1));
}

// 衣櫥渲染
function renderWar(){
  const g = document.getElementById('wgrid');
  const q = document.getElementById('search-input').value.toLowerCase();
  const sort = document.getElementById('sort-order').value;
  
  let list = W.filter(i => i.name.toLowerCase().includes(q) || i.type.toLowerCase().includes(q));
  
  if(sort === 'wear_most') list.sort((a,b) => getWearCount(b.id) - getWearCount(a.id));
  else if(sort === 'cpw_low') list.sort((a,b) => cpw(a) - cpw(b));
  else list.sort((a,b) => b.id - a.id);

  g.innerHTML = list.map(i => `
    <div class="card">
      <button class="btn-edit-float" onclick="openEdit(${i.id})">✎</button>
      <img src="${i.image}" class="cimg">
      <div class="cbody">
        <div class="c-name">${i.name}</div>
        <div><span class="tag">${i.type}</span><span class="tag">${i.color}</span></div>
        <div class="wear-badge">🕒 累積穿搭：${getWearCount(i.id)} 次</div>
      </div>
    </div>
  `).join('');
}

// OOTD 處理
async function onOotdFile(e) {
  const f = e.target.files[0]; if(!f) return;
  const b64 = await new Promise(r=>{const rd=new FileReader(); rd.onload=ev=>r(ev.target.result); rd.readAsDataURL(f);});
  const newOotd = { id: Date.now(), date: new Date().toLocaleDateString(), image: b64, items: [] };
  OOTD.unshift(newOotd);
  await saveAll();
  renderOotd();
  openOotdTagModal(newOotd.id);
}

function openOotdTagModal(oid) {
  document.getElementById('ootd-tag-id').value = oid;
  const o = OOTD.find(x => x.id === oid);
  document.getElementById('ootd-tag-selector').innerHTML = W.map(i => 
    `<img src="${i.image}" class="p-chk-img ${o.items.includes(i.id)?'selected':''}" onclick="this.classList.toggle('selected'); this.dataset.id=${i.id}" data-id="${i.id}">`
  ).join('');
  document.getElementById('ootd-tag-modal').classList.add('active');
}

async function saveOotdTags() {
  const oid = parseInt(document.getElementById('ootd-tag-id').value);
  const o = OOTD.find(x => x.id === oid);
  o.items = Array.from(document.querySelectorAll('#ootd-tag-selector .p-chk-img.selected')).map(el => parseInt(el.dataset.id));
  await saveAll();
  renderOotd();
  document.getElementById('ootd-tag-modal').classList.remove('active');
  toast('標記完成，次數已更新！');
}

function renderOotd() {
  const c = document.getElementById('ootd-content');
  c.innerHTML = OOTD.map(o => `
    <div class="card" style="margin-bottom:16px;">
      <img src="${o.image}" style="width:100%;">
      <div style="padding:12px; display:flex; justify-content:space-between; align-items:center;">
        <span>📅 ${o.date}</span>
        <div>
          <button class="btn btn-sec" style="width:auto; padding:6px 12px; font-size:12px;" onclick="openOotdTagModal(${o.id})">標記單品</button>
          <button class="btn-danger" onclick="delOotd(${o.id})">刪除</button>
        </div>
      </div>
    </div>
  `).join('');
}

// 通用功能
async function onFile(e){
  const files = e.target.files;
  for(let f of files){
    const b64 = await new Promise(r=>{const rd=new FileReader(); rd.onload=ev=>r(ev.target.result); rd.readAsDataURL(f);});
    uploadQueue.push(b64);
  }
  processQueue();
}
function processQueue(){
  if(!uploadQueue.length){ document.getElementById('step2').style.display='none'; document.getElementById('dz').style.display='block'; return; }
  document.getElementById('dz').style.display='none'; window.lastB64 = uploadQueue[0];
  document.getElementById('batch-status').textContent = `剩餘 ${uploadQueue.length} 件待建檔`;
  document.getElementById('step2').style.display='block';
}
async function addItem(){
  W.unshift({ id:Date.now(), name:document.getElementById('ef-name').value||'未命名', type:document.getElementById('ef-type').value, color:document.getElementById('ef-color').value||'未填', price:parseFloat(document.getElementById('ef-price').value)||0, image:window.lastB64 });
  await saveAll(); uploadQueue.shift(); processQueue();
}
function skipItem(){ uploadQueue.shift(); processQueue(); }

async function saveAll(){ await idbSet('W',W); await idbSet('OOTD',OOTD); updateSt(); }
function updateSt(){ document.getElementById('st-txt').textContent = `🧥 ${W.length}件衣物`; }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
function go(n){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('p-'+n).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(t=>t.classList.toggle('active', t.getAttribute('onclick').includes(n)));
  if(n==='war') renderWar();
  if(n==='ootd') renderOotd();
  if(n==='ins') renderIns();
}

function renderIns() {
  document.getElementById('st-total').textContent = '$'+ W.reduce((a,b)=>a+b.price,0).toLocaleString();
  const totalWears = W.reduce((a,b)=> a + getWearCount(b.id), 0);
  document.getElementById('st-cpw').textContent = '$'+ (totalWears ? Math.round(W.reduce((a,b)=>a+b.price,0)/totalWears) : 0);
}

function openEdit(id) {
  const i = W.find(x => x.id === id);
  document.getElementById('ed-id').value = i.id;
  document.getElementById('ed-name').value = i.name;
  document.getElementById('ed-price').value = i.price;
  document.getElementById('edit-modal').classList.add('active');
}
async function saveEdit() {
  const i = W.find(x => x.id === parseInt(document.getElementById('ed-id').value));
  i.name = document.getElementById('ed-name').value;
  i.price = parseFloat(document.getElementById('ed-price').value);
  await saveAll(); renderWar(); document.getElementById('edit-modal').classList.remove('active');
}
async function deleteItem() {
  if(confirm('確定刪除？')) {
    W = W.filter(x => x.id !== parseInt(document.getElementById('ed-id').value));
    await saveAll(); renderWar(); document.getElementById('edit-modal').classList.remove('active');
  }
}
async function delOotd(id) {
  if(confirm('刪除這則穿搭？')) { OOTD = OOTD.filter(x => x.id !== id); await saveAll(); renderOotd(); }
}
function exportData() {
  const blob = new Blob([JSON.stringify({W, OOTD})], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Wardrobe_Backup.json'; a.click();
}
function toggleTheme() { document.body.classList.toggle('dark-mode'); }
</script>
</body>
</html>
