<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>智慧衣櫥 v5.8 — 旅行分日與靈感收藏</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
/* ─── 核心質感樣式 ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color:transparent;}
:root{
  --bg: #F5F7FA; --sur: #FFFFFF; --sur2: #F0F2F5; --txt: #1C1C1E; --mut: #8E8E93;
  --accent: #2C2C2E; --blue: #007AFF; --red: #FF3B30; --shadow: 0 8px 24px rgba(0,0,0,0.04);
  --r: 16px; --rl: 24px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--txt); min-height:100vh; font-size:15px; line-height:1.5; padding-bottom:90px;}
.app{max-width:740px; margin:0 auto; padding:2rem 1.2rem}

.hd{display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem}
.hd-t{font-size:22px; font-weight:800; letter-spacing:-0.5px}
.storage-txt{font-size:11px; color:var(--mut); font-weight:600;}

.panel{display:none; animation:fadeIn 0.3s ease;}
.panel.active{display:block}
@keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

/* 區塊與表單 */
.zone{background:var(--sur); border-radius:var(--rl); padding:2.5rem 1rem; text-align:center; cursor:pointer; box-shadow:var(--shadow);}
.pimg{width:140px; height:140px; object-fit:cover; border-radius:var(--r); display:block; margin:0 auto 1rem;}
.ef{background:var(--sur); border-radius:var(--rl); padding:20px; margin-top:16px; box-shadow:var(--shadow)}
.g2{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px}
.fld{display:flex; flex-direction:column; gap:6px}
.lbl{font-size:11px; font-weight:700; color:var(--mut);}
input,select{font-family:inherit; font-size:14px; padding:12px 14px; border:none; border-radius:12px; background:var(--sur2); width:100%; font-weight:500;}
input:focus,select:focus{outline:none; box-shadow:0 0 0 2px var(--accent);}

/* 衣櫥工具列與卡片 */
.tool-bar{display:flex; gap:8px; margin-bottom:16px;}
.search-box{flex:1; display:flex; align-items:center; background:var(--sur); border-radius:99px; padding:4px 16px; box-shadow:var(--shadow)}
.search-box input{border:none; background:transparent; padding:10px 5px; width:100%;}
.sort-sel{background:var(--sur); border-radius:99px; padding:0 12px; border:none; box-shadow:var(--shadow); font-size:13px; font-weight:600; width:auto;}

.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:16px}
.card{background:var(--sur); border-radius:var(--rl); overflow:hidden; box-shadow:var(--shadow); padding-bottom:12px; display:flex; flex-direction:column; position:relative;}
.cimg{width:100%; height:160px; object-fit:cover}
.cbody{padding:12px 12px 0; flex-grow:1; display:flex; flex-direction:column;}
.c-name{font-weight:700; font-size:14px; margin-bottom:4px; text-overflow:ellipsis; overflow:hidden; white-space:nowrap;}
.tag{font-size:10px; padding:4px 8px; border-radius:6px; background:var(--sur2); color:var(--mut); font-weight:700; display:inline-block; margin-bottom:4px; margin-right:4px;}

/* 彈出視窗 */
.btn-edit-float{position:absolute; top:8px; right:8px; background:rgba(255,255,255,0.9); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.1); border:none;}
.modal-overlay{position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px;}
.modal-overlay.active{display:flex;}
.modal-card{background:var(--sur); width:100%; max-width:400px; border-radius:var(--rl); padding:24px; box-shadow:0 20px 40px rgba(0,0,0,0.2); max-height:90vh; overflow-y:auto;}

/* 穿搭與扭蛋 */
.cal-grid{display:grid; grid-template-columns:repeat(7, 1fr); gap:4px; margin-top:12px;}
.cal-day{aspect-ratio:1; border-radius:8px; background:var(--sur2); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:var(--mut); position:relative; overflow:hidden; border:1px solid rgba(0,0,0,0.05);}
.cal-day.has-ootd{background-size:cover; background-position:center; color:transparent;}
.cal-day.has-ootd::after{content:''; position:absolute; inset:0; box-shadow:inset 0 0 0 2px var(--accent); border-radius:8px;}
.roulette-box{display:flex; gap:12px; justify-content:center; margin:20px 0;}
.r-img{width:120px; height:120px; border-radius:var(--r); object-fit:cover; box-shadow:var(--shadow);}

/* 收藏清單 */
.fav-strip{display:flex; gap:12px; overflow-x:auto; padding-bottom:8px; margin-top:12px;}
.fav-item{min-width:100px; background:var(--sur2); border-radius:12px; padding:4px; display:flex; flex-direction:column; gap:4px; position:relative;}
.fav-img{width:100%; height:80px; object-fit:cover; border-radius:8px;}
.del-fav{position:absolute; top:-6px; right:-6px; background:var(--red); color:#fff; border:none; width:20px; height:20px; border-radius:50%; font-size:10px; cursor:pointer;}

/* 旅行打包清單 */
.pack-item{background:var(--sur); border-radius:var(--rl); padding:16px; margin-bottom:12px; box-shadow:var(--shadow); border-left:4px solid var(--blue);}
.pack-day-row{background:var(--sur2); border-radius:12px; padding:12px; margin-top:8px;}
.pack-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:8px; margin-top:12px;}
.p-chk-img{width:100%; height:80px; object-fit:cover; border-radius:12px; border:3px solid transparent; transition:0.2s;}
.p-chk-img.selected{border-color:var(--blue); opacity:0.8; transform:scale(0.95);}

/* 按鈕與導覽列 */
.btn{cursor:pointer; padding:12px; border-radius:99px; border:none; width:100%; font-family:inherit; font-size:14px; font-weight:700; margin-top:8px;}
.btn-p{background:var(--accent); color:#fff;}
.btn-sec{background:var(--sur2); color:var(--txt);}
.btn-sm{padding:8px; font-size:12px;}
.btn-danger{background:none; color:var(--red); font-size:11px; padding:6px;}

.bottom-nav{position:fixed; bottom:0; left:0; right:0; background:rgba(255,255,255,0.85); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); display:flex; justify-content:space-around; padding:10px 0 calc(10px + env(safe-area-inset-bottom)); box-shadow:0 -1px 0 rgba(0,0,0,0.05); z-index:100;}
.nav-item{display:flex; flex-direction:column; align-items:center; color:var(--mut); border:none; background:none; font-size:10px; font-weight:600; gap:4px; flex:1;}
.nav-item.active{color:var(--accent);}
.icon{font-size:22px;}

.toast{position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-100px); background:var(--accent); color:#fff; padding:12px 24px; border-radius:99px; transition:0.4s; z-index:1100; font-weight:600;}
.toast.show{transform:translateX(-50%) translateY(0)}

.stat-box{background:var(--sur); padding:20px; border-radius:var(--rl); box-shadow:var(--shadow);}
</style>
</head>
<body>

<div class="app">
  <div class="hd"><span class="hd-t">Wardrobe <span style="font-size:12px; color:var(--blue);">v5.8</span></span><span class="storage-txt" id="st-txt">計算中...</span></div>

  <div id="p-cat" class="panel active">
    <div class="zone" id="dz" onclick="document.getElementById('fi').click()">
      <input type="file" id="fi" accept="image/*" multiple style="display:none" onchange="onFile(event)">
      <div style="font-size:40px; margin-bottom:10px;">👕</div>
      <p style="font-weight:700;">點擊新增單品</p>
    </div>
    <div class="ef" id="step2" style="display:none">
      <div id="batch-status" style="font-size:12px; font-weight:700; color:var(--blue); margin-bottom:12px; text-align:center;"></div>
      <div class="g2">
        <div class="fld"><span class="lbl">名稱</span><input type="text" id="ef-name" placeholder="例：黑色短踢"></div>
        <div class="fld"><span class="lbl">類型</span><select id="ef-type"><option>上身</option><option>下身</option><option>外套</option><option>鞋子</option><option>配件</option></select></div>
      </div>
      <div class="g2">
        <div class="fld"><span class="lbl">季節</span><select id="ef-season"><option>四季</option><option>春夏</option><option>秋冬</option></select></div>
        <div class="fld"><span class="lbl">顏色</span><input type="text" id="ef-color" placeholder="例：燕麥色"></div>
      </div>
      <div class="fld" style="margin-bottom:12px;"><span class="lbl">購入價格</span><input type="number" id="ef-price"></div>
      <button class="btn btn-p" onclick="addItem()">完成建檔</button>
      <button class="btn btn-sec" onclick="skipItem()">跳過</button>
    </div>
  </div>

  <div id="p-war" class="panel">
    <div class="tool-bar">
      <div class="search-box"><span>🔍</span><input type="text" id="search-input" placeholder="搜尋..." oninput="renderWar()"></div>
      <select class="sort-sel" id="sort-order" onchange="renderWar()">
        <option value="new">🆕 最新加入</option>
        <option value="cpw_high">💸 CPW 最高</option>
        <option value="cpw_low">👑 CPW 最低</option>
        <option value="wear_most">🔥 最常穿</option>
      </select>
    </div>
    <div class="grid" id="wgrid"></div>
  </div>

  <div id="p-ootd" class="panel">
    <div class="g2">
      <button class="btn btn-p" onclick="document.getElementById('ootd-fi').click()" style="margin:0;">📸 記錄今日穿搭</button>
      <button class="btn btn-sec" onclick="openRoulette()" style="margin:0; background:#FFF1E5; color:#FF9500;">🎲 穿搭扭蛋機</button>
    </div>
    <input type="file" id="ootd-fi" accept="image/*" capture="environment" style="display:none" onchange="onOotdFile(event)">
    
    <div class="ef" style="margin-top:20px; padding:16px;">
      <span style="font-weight:800; font-size:16px; color:var(--red);">❤️ 靈感收藏</span>
      <div id="fav-list"></div>
    </div>

    <div class="ef" style="margin-top:20px; padding:16px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:800; font-size:16px;">穿搭回顧</span>
        <select class="sort-sel" id="ootd-view-toggle" onchange="renderOotd()">
          <option value="list">列表模式</option>
          <option value="cal">月曆模式</option>
        </select>
      </div>
      <div id="ootd-content" style="margin-top:16px;"></div>
    </div>
  </div>

  <div id="p-pack" class="panel">
    <button class="btn btn-p" onclick="createPack()" style="margin-bottom:16px;">✈️ 新增旅行計畫</button>
    <div id="pack-list"></div>
  </div>

  <div id="p-ins" class="panel">
    <div class="g2">
      <div class="stat-box"><span class="lbl">總價值</span><div style="font-size:24px; font-weight:800;" id="st-total">$0</div></div>
      <div class="stat-box"><span class="lbl">平均 CPW</span><div style="font-size:24px; font-weight:800;" id="st-cpw">$0</div></div>
    </div>
    <div class="stat-box" style="margin-top:16px;"><span class="lbl">顏色足跡</span><div id="st-colors" style="margin-top:12px;"></div></div>
    
    <div class="stat-box" style="margin-top:16px; background:#F8F9FA;">
      <span class="lbl" style="color:var(--accent);">☁️ 安全與備份</span>
      <p style="font-size:12px; color:var(--mut); margin:8px 0;">換手機或怕資料遺失？請定期下載備份檔。</p>
      <button class="btn btn-sec" onclick="exportData()">⬇️ 下載備份檔 (.json)</button>
      <button class="btn btn-sec" onclick="document.getElementById('import-fi').click()" style="margin-top:8px;">⬆️ 從備份檔還原</button>
      <input type="file" id="import-fi" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</div>

<div class="modal-overlay" id="roulette-modal">
  <div class="modal-card" style="text-align:center;">
    <h3 style="margin-bottom:8px;">🎲 穿搭靈感</h3>
    <div class="roulette-box" id="r-result"></div>
    <div class="g2" style="margin-top:16px;">
      <button class="btn btn-sec" onclick="saveFavOutfit()" style="color:var(--red); background:#FFF1F0; margin:0;">❤️ 收藏這套</button>
      <button class="btn btn-p" onclick="rollOutfit()" style="margin:0;">🔄 再抽一次</button>
    </div>
    <button class="btn btn-sec" style="margin-top:12px;" onclick="document.getElementById('roulette-modal').classList.remove('active')">關閉</button>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal-card">
    <h3 style="margin-bottom:16px;">編輯單品</h3>
    <div class="g2">
      <div class="fld"><span class="lbl">名稱</span><input type="text" id="ed-name"></div>
      <div class="fld"><span class="lbl">類型</span><select id="ed-type"><option>上身</option><option>下身</option><option>外套</option><option>鞋子</option><option>配件</option></select></div>
    </div>
    <div class="g2">
      <div class="fld"><span class="lbl">季節</span><select id="ed-season"><option>四季</option><option>春夏</option><option>秋冬</option></select></div>
      <div class="fld"><span class="lbl">顏色</span><input type="text" id="ed-color"></div>
    </div>
    <div class="fld"><span class="lbl">價格</span><input type="number" id="ed-price"></div>
    <input type="hidden" id="ed-id">
    <button class="btn btn-p" onclick="saveEdit()">儲存</button>
    <button class="btn btn-sec" onclick="document.getElementById('edit-modal').classList.remove('active')">取消</button>
  </div>
</div>

<div class="modal-overlay" id="pack-modal">
  <div class="modal-card" style="max-width:600px;">
    <h3 id="pack-title" style="margin-bottom:8px;">挑選衣物</h3>
    <p style="font-size:12px; color:var(--blue); font-weight:700; margin-bottom:12px;">點擊圖片勾選要穿的衣服</p>
    <div id="pack-selector" class="pack-grid" style="max-height:50vh; overflow-y:auto; padding-bottom:10px;"></div>
    <input type="hidden" id="pack-id"><input type="hidden" id="pack-day">
    <button class="btn btn-p" onclick="savePackSelection()">✓ 完成挑選</button>
    <button class="btn btn-sec" onclick="document.getElementById('pack-modal').classList.remove('active')">取消</button>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-item active" onclick="go('cat')"><span class="icon">✨</span><span>建檔</span></button>
  <button class="nav-item" onclick="go('war')"><span class="icon">👕</span><span>衣櫥</span></button>
  <button class="nav-item" onclick="go('ootd')"><span class="icon">📸</span><span>穿搭</span></button>
  <button class="nav-item" onclick="go('pack')"><span class="icon">🧳</span><span>旅行</span></button>
  <button class="nav-item" onclick="go('ins')"><span class="icon">📊</span><span>洞察</span></button>
</nav>

<div class="toast" id="toast"></div>

<script>
// --- 資料初始化與升級 ---
let W = JSON.parse(localStorage.getItem('wv58') || localStorage.getItem('wv57') || '[]');
let OOTD = JSON.parse(localStorage.getItem('wv58_ootd') || localStorage.getItem('wv57_ootd') || '[]');
let PACK = JSON.parse(localStorage.getItem('wv58_pack') || localStorage.getItem('wv57_pack') || '[]');
let FAV = JSON.parse(localStorage.getItem('wv58_fav') || '[]'); // 新增收藏資料庫
let uploadQueue = [];

// 確保旅行資料結構相容分日版
PACK.forEach(p => { 
  if(!p.days) p.days = 1; 
  if(!p.plan) { p.plan = {}; p.plan[1] = p.items || []; }
});

function cpw(i) { return Math.round(i.price / ((i.wears || []).length || 1)); }

// --- 1. 批量建檔 ---
async function onFile(e){
  const files = e.target.files; if(!files.length) return; toast('照片處理中...');
  for(let f of files){
    const b64 = await new Promise(r=>{const rd=new FileReader(); rd.onload=ev=>r(ev.target.result); rd.readAsDataURL(f);});
    const img = new Image(); img.src = b64;
    await new Promise(r=>{ img.onload=()=>{
      const c=document.createElement('canvas'); const ctx=c.getContext('2d');
      c.width=400; c.height=(img.height/img.width)*400; ctx.drawImage(img,0,0,c.width,c.height);
      uploadQueue.push(c.toDataURL('image/jpeg',0.7)); r();
    };});
  }
  processQueue();
}
function processQueue(){
  if(!uploadQueue.length){
    document.getElementById('step2').style.display='none'; document.getElementById('dz').style.display='block'; return;
  }
  document.getElementById('dz').style.display='none'; window.lastB64 = uploadQueue[0];
  document.getElementById('ef-name').value=''; document.getElementById('ef-color').value=''; document.getElementById('ef-price').value='';
  document.getElementById('batch-status').textContent = uploadQueue.length>1?`連續建檔：剩 ${uploadQueue.length-1} 件`:'最後一件！';
  document.getElementById('step2').style.display='block';
}
function addItem(){
  W.unshift({ id:Date.now(), name:document.getElementById('ef-name').value||'未命名', type:document.getElementById('ef-type').value, season:document.getElementById('ef-season').value, color:document.getElementById('ef-color').value||'未填', price:parseFloat(document.getElementById('ef-price').value)||0, wears:[], image:window.lastB64 });
  saveAll(); toast('已收錄！'); uploadQueue.shift(); processQueue();
}
function skipItem(){ uploadQueue.shift(); processQueue(); }

// --- 2. 衣櫥與排序 ---
function renderWar(){
  const g = document.getElementById('wgrid');
  const q = document.getElementById('search-input').value.toLowerCase();
  const sort = document.getElementById('sort-order').value;
  let list = W.filter(i=> i.name.toLowerCase().includes(q) || i.type.toLowerCase().includes(q) || (i.color||'').toLowerCase().includes(q) || (i.season||'').includes(q));
  
  if(sort === 'cpw_high') list.sort((a,b)=> cpw(b) - cpw(a));
  else if(sort === 'cpw_low') list.sort((a,b)=> cpw(a) - cpw(b));
  else if(sort === 'wear_most') list.sort((a,b)=> (b.wears||[]).length - (a.wears||[]).length);
  else list.sort((a,b)=> b.id - a.id);
  
  g.innerHTML = list.map(i=>`
    <div class="card">
      <button class="btn-edit-float" onclick="openEdit(${i.id})">✎</button>
      <img src="${i.image}" class="cimg">
      <div class="cbody">
        <div class="c-name">${i.name}</div>
        <div>
          <span class="tag">CPW $${cpw(i)}</span>
          <span class="tag" style="background:${getColorCode(i.color)}20; color:${getColorCode(i.color)};">${i.color}</span>
        </div>
        <button class="btn btn-sm btn-p" onclick="logW(${i.id})">穿著打卡 (${(i.wears||[]).length})</button>
      </div>
    </div>
  `).join('');
}

function openEdit(id) {
  const i = W.find(x => x.id === id); if(!i) return;
  document.getElementById('ed-id').value = i.id; document.getElementById('ed-name').value = i.name;
  document.getElementById('ed-type').value = i.type; document.getElementById('ed-season').value = i.season || '四季';
  document.getElementById('ed-color').value = i.color; document.getElementById('ed-price').value = i.price;
  document.getElementById('edit-modal').classList.add('active');
}
function saveEdit() {
  const i = W.find(x => x.id === parseInt(document.getElementById('ed-id').value));
  if(i) {
    i.name = document.getElementById('ed-name').value || '未命名'; i.type = document.getElementById('ed-type').value;
    i.season = document.getElementById('ed-season').value; i.color = document.getElementById('ed-color').value || '未填';
    i.price = parseFloat(document.getElementById('ed-price').value) || 0;
    saveAll(); renderWar(); document.getElementById('edit-modal').classList.remove('active'); toast('修改已儲存');
  }
}

// --- 3. 穿搭：扭蛋、愛心、相簿 ---
let currentRoll = { top: null, bot: null };
function openRoulette() { document.getElementById('roulette-modal').classList.add('active'); rollOutfit(); }
function rollOutfit() {
  const tops = W.filter(x=>x.type==='上身'); const bots = W.filter(x=>x.type==='下身');
  const res = document.getElementById('r-result');
  if(!tops.length || !bots.length) { res.innerHTML = '<p style="color:var(--red)">衣服數量不足以抽籤喔！</p>'; return; }
  currentRoll.top = tops[Math.floor(Math.random()*tops.length)]; 
  currentRoll.bot = bots[Math.floor(Math.random()*bots.length)];
  res.innerHTML = `<img src="${currentRoll.top.image}" class="r-img"><img src="${currentRoll.bot.image}" class="r-img">`;
}
function saveFavOutfit() {
  if(!currentRoll.top || !currentRoll.bot) return;
  FAV.unshift({ id: Date.now(), top: currentRoll.top.id, bot: currentRoll.bot.id });
  saveAll(); renderFavs(); toast('❤️ 成功加入靈感庫！');
}

function renderFavs() {
  const fl = document.getElementById('fav-list');
  if(!FAV.length) { fl.innerHTML = '<p style="font-size:12px; color:var(--mut);">去扭蛋機抽籤並點擊愛心收藏吧！</p>'; return; }
  fl.innerHTML = '<div class="fav-strip">' + FAV.map(f => {
    const t = W.find(x=>x.id===f.top); const b = W.find(x=>x.id===f.bot);
    if(!t || !b) return '';
    return `<div class="fav-item">
      <button class="del-fav" onclick="delFav(${f.id})">✕</button>
      <img src="${t.image}" class="fav-img"><img src="${b.image}" class="fav-img">
    </div>`;
  }).join('') + '</div>';
}
function delFav(id) { FAV = FAV.filter(x=>x.id!==id); saveAll(); renderFavs(); }

async function onOotdFile(e) {
  const f = e.target.files[0]; if(!f) return; toast('處理中...');
  const b64 = await new Promise(r=>{const rd=new FileReader(); rd.onload=ev=>r(ev.target.result); rd.readAsDataURL(f);});
  const img = new Image(); img.src = b64;
  await new Promise(r=>{ img.onload=()=>{
    const c=document.createElement('canvas'); const ctx=c.getContext('2d');
    c.width = 600; c.height = 600 * (img.height/img.width); ctx.drawImage(img,0,0,c.width,c.height);
    const note = prompt('為這套穿搭寫點筆記吧？(可留空)');
    if (note !== null) {
       OOTD.unshift({ id: Date.now(), date: new Date().toLocaleDateString('zh-TW'), note: note, image: c.toDataURL('image/jpeg', 0.72) });
       saveAll(); renderOotd(); toast('穿搭已保存！');
    }
    e.target.value = ''; r();
  };});
}
function renderOotd() {
  renderFavs();
  const mode = document.getElementById('ootd-view-toggle').value;
  const c = document.getElementById('ootd-content');
  if(!OOTD.length) { c.innerHTML = '<p style="text-align:center; color:var(--mut);">還沒有穿搭紀錄喔！</p>'; return; }
  
  if(mode === 'list') {
    c.innerHTML = '<div style="display:grid; gap:16px;">' + OOTD.map(o => `
      <div class="card" style="padding-bottom:0;">
        <img src="${o.image}" style="width:100%; max-height:450px; object-fit:cover;">
        <div style="padding:16px; display:flex; justify-content:space-between; align-items:center;">
          <div><div style="font-weight:800;">${o.date}</div><div style="font-size:12px; color:var(--mut);">${o.note||''}</div></div>
          <button class="btn-danger" style="margin:0; background:#FFF1F0; padding:6px 12px; border-radius:8px;" onclick="delOotd(${o.id})">刪除</button>
        </div>
      </div>`).join('') + '</div>';
  } else {
    const today = new Date(); const daysInMonth = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
    let calHTML = '<div class="cal-grid">';
    for(let d=1; d<=daysInMonth; d++) {
      const dateStr = new Date(today.getFullYear(), today.getMonth(), d).toLocaleDateString('zh-TW');
      const ootdToday = OOTD.find(o => o.date === dateStr);
      if(ootdToday) calHTML += `<div class="cal-day has-ootd" style="background-image:url(${ootdToday.image})" onclick="alert('${dateStr}\\n${ootdToday.note||'無筆記'}')">${d}</div>`;
      else calHTML += `<div class="cal-day">${d}</div>`;
    }
    c.innerHTML = calHTML + '</div><p style="text-align:center; font-size:11px; margin-top:8px; color:var(--mut);">點擊圖片可查看筆記</p>';
  }
}
function delOotd(id) { if(confirm('確定刪除？')) { OOTD = OOTD.filter(x => x.id !== id); saveAll(); renderOotd(); } }

// --- 4. 旅行分日打包清單 ---
function createPack() {
  const name = prompt('請輸入旅行名稱 (例如：日本五天四夜)');
  if(!name) return;
  const daysStr = prompt('請問這趟旅行有幾天？ (請輸入數字)', '3');
  const days = parseInt(daysStr);
  if(!days || days <= 0) { alert('天數無效'); return; }
  
  let plan = {}; for(let d=1; d<=days; d++) plan[d] = [];
  PACK.unshift({ id: Date.now(), name: name, days: days, plan: plan }); 
  saveAll(); renderPack();
}

function renderPack() {
  const list = document.getElementById('pack-list');
  if(!PACK.length) { list.innerHTML = '<p style="text-align:center; color:var(--mut); padding:2rem;">還沒有旅行計畫，立刻新增一個吧！</p>'; return; }
  list.innerHTML = PACK.map(p => {
    let daysHtml = '';
    for(let d=1; d<=p.days; d++) {
      const dayItems = W.filter(w => (p.plan[d]||[]).includes(w.id));
      daysHtml += `
        <div class="pack-day-row">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <span style="font-weight:800; font-size:14px;">第 ${d} 天穿搭</span>
            <button onclick="openPackDay(${p.id}, ${d})" style="background:none; border:none; color:var(--blue); font-weight:700; cursor:pointer;">✎ 挑選衣服</button>
          </div>
          <div style="display:flex; gap:8px; overflow-x:auto;">
            ${dayItems.length ? dayItems.map(i=>`<img src="${i.image}" style="width:50px; height:50px; object-fit:cover; border-radius:8px;">`).join('') : '<span style="font-size:12px; color:var(--mut);">尚無安排</span>'}
          </div>
        </div>
      `;
    }
    return `
    <div class="pack-item">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <h4 style="font-weight:800; font-size:18px;">${p.name}</h4>
        <button class="btn-danger" style="margin:0; background:#FFF1F0; border-radius:8px;" onclick="delPack(${p.id})">刪除計畫</button>
      </div>
      ${daysHtml}
    </div>`;
  }).join('');
}

function openPackDay(id, day) {
  const p = PACK.find(x=>x.id===id); if(!p) return;
  document.getElementById('pack-id').value = p.id;
  document.getElementById('pack-day').value = day;
  document.getElementById('pack-title').textContent = `為「${p.name}」- 第 ${day} 天挑選`;
  const selectedItems = p.plan[day] || [];
  
  document.getElementById('pack-selector').innerHTML = W.map(i=>`
    <img src="${i.image}" class="p-chk-img ${selectedItems.includes(i.id)?'selected':''}" onclick="this.classList.toggle('selected'); this.dataset.id=${i.id}" data-id="${i.id}">
  `).join('');
  document.getElementById('pack-modal').classList.add('active');
}

function savePackSelection() {
  const pid = parseInt(document.getElementById('pack-id').value);
  const day = parseInt(document.getElementById('pack-day').value);
  const p = PACK.find(x=>x.id===pid);
  if(p) {
    if(!p.plan) p.plan = {};
    p.plan[day] = Array.from(document.querySelectorAll('.p-chk-img.selected')).map(el => parseInt(el.dataset.id));
    saveAll(); renderPack(); document.getElementById('pack-modal').classList.remove('active');
  }
}
function delPack(id) { if(confirm('確定刪除此旅行計畫？')) { PACK = PACK.filter(x=>x.id!==id); saveAll(); renderPack(); } }

// --- 5. 看板與備份 ---
function renderIns() {
  document.getElementById('st-total').textContent = '$'+ W.reduce((a,b)=>a+b.price,0).toLocaleString();
  document.getElementById('st-cpw').textContent = '$'+ (W.length ? Math.round(W.reduce((a,b)=>a+cpw(b),0)/W.length) : 0).toLocaleString();
  const colors = {}; W.forEach(i=>colors[i.color]=(colors[i.color]||0)+1);
  document.getElementById('st-colors').innerHTML = Object.entries(colors).map(([c,n])=>`
    <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-weight:600; font-size:14px; align-items:center;">
      <span style="display:flex; align-items:center;"><span style="display:inline-block; width:14px; height:14px; border-radius:50%; margin-right:10px; background:${getColorCode(c)}; border:1px solid rgba(0,0,0,0.1);"></span>${c}</span>
      <span>${Math.round(n/W.length*100)}%</span>
    </div>
  `).join('');
}

function exportData() {
  const data = JSON.stringify({ W: W, OOTD: OOTD, PACK: PACK, FAV: FAV });
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href = url; a.download = `Wardrobe_v5.8_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'')}.json`;
  a.click(); URL.revokeObjectURL(url); toast('已下載備份檔！');
}
function importData(e) {
  const f = e.target.files[0]; if(!f) return; const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if(parsed.W) {
        if(confirm('警告：還原備份將會覆蓋目前的衣櫥，確定繼續？')) {
          W = parsed.W; OOTD = parsed.OOTD || []; PACK = parsed.PACK || []; FAV = parsed.FAV || [];
          saveAll(); toast('還原成功！'); setTimeout(()=>location.reload(), 1500);
        }
      } else alert('無效的備份檔！');
    } catch(err) { alert('檔案讀取失敗！'); }
  };
  reader.readAsText(f);
}

// --- 系統共用 ---
function getColorCode(cn) {
  if(!cn) return '#ddd';
  const defaults = {'白':'#F2F2F7','黑':'#1C1C1E','灰':'#8E8E93','藍':'#007AFF','米':'#D2B48C','卡其':'#C3B091','紅':'#FF3B30','綠':'#34C759','黃':'#FFCC00','粉':'#FF2D55'};
  for(let k in defaults) if(cn.includes(k)) return defaults[k];
  let h=0; for(let i=0; i<cn.length; i++) h=cn.charCodeAt(i)+((h<<5)-h); return `hsl(${Math.abs(h)%360},65%,60%)`;
}
function logW(id){ const i=W.find(x=>x.id===id); i.wears.unshift({d:Date.now()}); saveAll(); renderWar(); toast('單品打卡 +1'); }
function saveAll(){ localStorage.setItem('wv58',JSON.stringify(W)); localStorage.setItem('wv58_ootd',JSON.stringify(OOTD)); localStorage.setItem('wv58_pack',JSON.stringify(PACK)); localStorage.setItem('wv58_fav',JSON.stringify(FAV)); updateSt(); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
function go(n){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('p-'+n).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(t=>t.classList.toggle('active', t.getAttribute('onclick').includes(n)));
  window.scrollTo(0,0);
  if(n==='war') renderWar(); if(n==='ins') renderIns(); if(n==='ootd') renderOotd(); if(n==='pack') renderPack();
}
function updateSt(){
  const s = new Blob([Object.values(localStorage).join('')]).size;
  document.getElementById('st-txt').textContent = `已用：${Math.min((s/(5*1024*1024))*100,100).toFixed(1)}%`;
}
updateSt(); go('cat'); // 預設開啟建檔
</script>
